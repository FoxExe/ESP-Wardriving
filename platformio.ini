; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp07s]
platform = espressif8266
board = esp07s
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder
;board_build.f_cpu = 160000000L ; Overclock to 160MHz for better SoftwareSerial
board_build.filesystem = littlefs
extra_scripts = pre:extra.py
;build_type = debug  ; need for esp8266_exception_decoder

lib_deps =
	ottowinter/ESPAsyncWebServer-esphome
	gyverlibs/GyverOLED
	marzogh/SPIMemory
	gyverlibs/EncButton
	slashdevin/NeoGPS

build_flags =
	-D SERIAL_DEBUG
	; NeoGPS configuration
	-D GPS_FIX_HDOP
	-D NMEAGPS_PARSE_GLL
	-D NMEAGPS_PARSE_GSA
	-D NMEAGPS_PARSE_GSV
	-D NMEAGPS_PARSE_SATELLITES
	-D NMEAGPS_PARSE_SATELLITE_INFO
	-D NMEAGPS_KEEP_DATE
	-D NMEAGPS_KEEP_TIME
